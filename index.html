<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="resources/css/glitch.css">
<meta http-equiv="refresh" content="5;url=./main.html">
</head>
    <body style="margin:0; width:100vw; min-height:100vh; background-color:#181717; color:#66ffea; display:flex; justify-content:center; align-items:center; flex-direction:column; gap:1rem; text-align:center;">
        <a></a>
        <div id="countdown" style="font-family:'Segoe UI',sans-serif; font-size:1.25rem; letter-spacing:.1em; text-transform:uppercase; color:#ff4d6d; text-shadow:0 0 20px rgba(255,77,109,.65);">
            Loading in 5...
        </div>
        <a style="text-decoration:none; font-size:3rem; color:#656464;" data-text="InfoSec Educator" href="./main.html">InfoSec Educator</a>
        <script>
            const countdownEl = document.getElementById('countdown');
            let secondsLeft = 5;
            const interval = setInterval(() => {
                secondsLeft -= 1;
                if (secondsLeft <= 0) {
                    countdownEl.textContent = 'Boot sequence complete.';
                    clearInterval(interval);
                    return;
                }
                countdownEl.textContent = `Loading in ${secondsLeft}...`;
            }, 1000);
        </script>
    </body>
</html>
